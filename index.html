<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <title>Boomtown</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <!-- Phase 1: lobby (create / join). Populated by src/ui/lobby.ts -->
    <div id="lobby"></div>

    <!-- Phase 2: in-game. Hidden until a game is entered. -->
    <div id="game-root" class="hidden">
      <canvas id="game"></canvas>

      <div id="topbar" class="panel">
        <span id="city-flag" class="flag"></span>
        <span id="city-name" class="city"></span>
        <span id="game-clock" class="clock"></span>
        <span id="speed-controls" class="speed"></span>
        <span id="player-chip" class="chip"></span>
        <button id="leave-btn">Leave</button>
      </div>

      <div id="stats" class="panel"></div>
      <div id="overlay" class="panel"></div>
      <div id="players" class="panel"></div>
      <div id="inspector" class="panel hidden"></div>
      <div id="shaft-panel" class="panel hidden"></div>
      <div id="person-tip" class="hidden"></div>
      <div id="minimap" class="panel"></div>

      <div id="nav-controls" class="panel">
        <button id="claim-btn" class="nav-claim" title="Claim an available plot (C)">＋ Claim Plot</button>
        <button id="jump-btn" title="Center on your plots">◎ My Plots</button>
      </div>

      <div id="girder-styles" class="panel hidden"></div>
      <div id="tool-submenu" class="panel hidden"></div>
      <div id="toolbar" class="panel"></div>
      <div id="hint" class="panel"></div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
